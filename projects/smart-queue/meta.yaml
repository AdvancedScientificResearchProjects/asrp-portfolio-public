role_ru: "ASRP полностью владел подсистемой маршрутизации звонков — дизайн, реализация, роадмап"
summary_ru: "Нативная для платформы очередь ring-all: при звонке звонят сразу всем залогиненным агентам, а звонок забирает тот, кто ответил первым, через блокировку Redis (ровно один победитель), с идемпотентным fallback, если никто не ответил."
highlights_ru:
